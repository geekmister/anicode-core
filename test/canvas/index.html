<html>
  <head>
    <title>My House</title>
  </head>
  <body>
    <h1>My House</h1>
    <canvas id="my-house" width="300" height="300"></canvas>
  </body>
  <script>
    const canvas = document.getElementById("my-house");
    const ctx = canvas.getContext("2d");
    // 设置线条宽度
    ctx.lineWidth = 10;

    // 墙
    ctx.strokeRect(75, 140, 150, 110);

    // 门
    ctx.fillRect(130, 190, 40, 60);

    // 房顶
    ctx.beginPath();
    ctx.moveTo(50, 140);
    ctx.lineTo(150, 60);
    ctx.lineTo(250, 140);
    ctx.closePath();
    ctx.stroke();
  </script>
</html>
